    onSnapshot(draftDocRef, (docSnap) => {

            const data = docSnap.data();
            players = data.players;
            fantasyTeams = data.fantasyTeams;
            draftOrder = data.draftOrder;
            currentPickIndex = data.currentPickIndex;
            maxPlayersPerTeam = data.maxPlayersPerTeam;

            const setupTab = document.getElementById('setup-tab');
            if (setupTab.style.display !== 'none') {
                setupTab.style.display = 'none';
                document.getElementById('navTabs').style.display = 'flex';
                window.switchTab('draft');
            }

            updateDraftUI();
            updateTeamsUI();
            updateRosterUI();
        }
    });

    // 6. Making functions global so HTML buttons can click them
    window.generateTeamInputs = function() {

        const container = document.getElementById('teamNamesContainer');
        container.innerHTML = '<h3 style="font-size:1.1em; color:var(--text-muted);">Enter Franchise Names:</h3>';
        for (let i = 1; i <= num; i++) {
            container.innerHTML += `<div class="form-group"><input type="text" id="teamName${i}" value="Franchise ${i}"></div>`;
        }
    };
    window.generateTeamInputs(); // Call once on load

    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId + '-tab').classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');
    };

    window.startDraft = async function() {
        const num = document.getElementById('numTeams').value;
        maxPlayersPerTeam = document.getElementById('playersPerTeam').value;
        
        fantasyTeams = [];
        let tempTeams = [];
        for (let i = 1; i <= num; i++) {
            const name = document.getElementById(`teamName${i}`).value || `Franchise ${i}`;
            let teamObj = { name: name, roster: [] };
            fantasyTeams.push(teamObj);
            tempTeams.push(teamObj);
        }

        // Snake draft logic
        tempTeams = tempTeams.sort(() => Math.random() - 0.5);
        draftOrder = [];
        for(let round = 1; round <= maxPlayersPerTeam; round++) {
            let roundOrder = [...tempTeams];
            if (round % 2 === 0) roundOrder.reverse(); 
            draftOrder = draftOrder.concat(roundOrder);
        }

        // PUSH initial setup to Firebase
        await setDoc(draftDocRef, {
            players: players,
            fantasyTeams: fantasyTeams,
            draftOrder: draftOrder,
            currentPickIndex: 0,
            maxPlayersPerTeam: maxPlayersPerTeam
        });
        
        // Note: We don't manually switch tabs or update UI here anymore. 
        // The onSnapshot listener will detect the new setDoc and do it for us!
    };

    window.populateDraftDropdown = function() {
        const search = document.getElementById('filterName').value.toLowerCase();
        const role = document.getElementById('filterRole').value;
        const iplTeam = document.getElementById('filterIPLTeam').value;
        const overseas = document.getElementById('filterOverseas').value;
        const select = document.getElementById('playerSelect');
        
        select.innerHTML = '';
        
        let filtered = players.filter(p => !p.draftedBy);

        if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search));
        if (role !== 'All') filtered = filtered.filter(p => p.role === role);
        if (iplTeam !== 'All') filtered = filtered.filter(p => p.iplTeam === iplTeam);
        if (overseas === 'Indian') filtered = filtered.filter(p => !p.isOverseas);
        if (overseas === 'Overseas') filtered = filtered.filter(p => p.isOverseas);

        filtered.forEach(p => {
            let opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = `${p.name} — ${p.iplTeam} | ${p.role} ${p.isOverseas ? '[✈️ OS]' : ''}`;
            select.appendChild(opt);
        });
    };

    function updateDraftUI() {
        if (currentPickIndex >= draftOrder.length) {
            document.getElementById('currentPickDisplay').innerHTML = "🏁 Draft Complete!";
            document.getElementById('playerSelect').disabled = true;
            return;
        }

        const currentTeam = draftOrder[currentPickIndex].name;
        const round = Math.floor(currentPickIndex / fantasyTeams.length) + 1;
        document.getElementById('currentPickDisplay').innerHTML = `<span style="color:var(--text-muted); font-size: 0.7em; display:block; margin-bottom:5px;">Round ${round}</span> ${currentTeam} is on the clock!`;
        
        const list = document.getElementById('upcomingOrderList');
        list.innerHTML = '';
        for(let i = currentPickIndex; i < Math.min(currentPickIndex + 5, draftOrder.length); i++) {
            let li = document.createElement('li');
            li.textContent = draftOrder[i].name;
            if (i === currentPickIndex) li.classList.add('active-pick');
            list.appendChild(li);
        }

        window.populateDraftDropdown();
        document.getElementById('draftAlert').style.display = 'none';
    }

    window.draftPlayer = async function() {
        const playerId = document.getElementById('playerSelect').value;
        if (!playerId) return;

        const player = players.find(p => p.id == playerId);
        const currentTeamObj = draftOrder[currentPickIndex];
        const actualTeam = fantasyTeams.find(t => t.name === currentTeamObj.name);

        if (player.isOverseas) {
            const overseasCount = actualTeam.roster.filter(p => p.isOverseas).length;
            if (overseasCount >= 8) {
                const alertEl = document.getElementById('draftAlert');
                alertEl.style.display = 'inline-block';
                alertEl.innerText = "⚠️ Invalid Pick! Maximum 8 overseas players limit reached.";
                return;
            }
        }

        // Update local variables
        player.draftedBy = actualTeam.name;
        actualTeam.roster.push(player);
        let nextIndex = currentPickIndex + 1;
        
        // PUSH pick to Firebase
        await updateDoc(draftDocRef, {
            players: players,
            fantasyTeams: fantasyTeams,
            currentPickIndex: nextIndex
        });
    };

    function updateTeamsUI() {
        const grid = document.getElementById('teamGrid');
        grid.innerHTML = '';
        fantasyTeams.forEach(team => {
            let osCount = team.roster.filter(p => p.isOverseas).length;
            let html = `<div class="team-card glass-panel">
                <h3 style="margin: 0 0 5px 0;">${team.name}</h3>
                <div style="display:flex; justify-content: space-between; font-size: 0.85em; color: var(--text-muted);">
                    <span>Roster: ${team.roster.length}/${maxPlayersPerTeam}</span>
                    <span style="color: ${osCount >= 8 ? 'var(--danger)' : 'inherit'}">OS: ${osCount}/8</span>
                </div>
                <ul>`;
            team.roster.forEach(p => {
                html += `<li>
                    <span style="font-weight: 600;">${p.name} <span style="font-weight:400; color:var(--text-muted); font-size:0.9em;">(${p.role})</span></span> 
                    ${p.isOverseas ? '<span class="overseas-badge">✈️ OS</span>' : ''}
                </li>`;
            });
            html += `</ul></div>`;
            grid.innerHTML += html;
        });
    }

    function updateRosterUI() {
        const tbody = document.querySelector('#globalRosterTable tbody');
        tbody.innerHTML = '';
        players.forEach(p => {
            tbody.innerHTML += `<tr>
                <td style="font-weight: 600;">${p.name}</td>
                <td>${p.iplTeam}</td>
                <td>${p.role}</td>
                <td>${p.isOverseas ? '✈️ Overseas' : '🇮🇳 Indian'}</td>
                <td style="font-weight:700; color: ${p.draftedBy ? 'var(--cream)' : 'var(--text-muted)'}">${p.draftedBy || 'Undrafted'}</td>
            </tr>`;
        });
    }

    window.exportCSV = function() {
        let csvContent = "data:text/csv;charset=utf-8,Player Name,IPL Team,Role,Origin,Drafted By\n";
        players.forEach(p => {
            let row = `"${p.name}","${p.iplTeam}","${p.role}","${p.isOverseas ? 'Overseas' : 'Indian'}","${p.draftedBy || 'Undrafted'}"`;
            csvContent += row + "\n";
        });
        
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "fantasy_draft_results.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };
</script>
